name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/frontend-ci-vercel.yml
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/frontend-ci-vercel.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: Frontend Quality Checks
    runs-on: ubuntu-latest
    env:
      CI: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
